---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  chef_license: accept
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: debian-12
  - name: debian-13
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  cacher: &cacher_run_list
    - recipe[test::cacher]
  compile_time: &compile_time_run_list
    - recipe[test::compile_time]
  unattended: &unattended_run_list
    - recipe[test::unattended_upgrades]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  cacher: &cacher_verifier
    inspec_tests:
      - path: test/integration/cacher
  compile_time: &compile_time_verifier
    inspec_tests:
      - path: test/integration/compile-time
  unattended: &unattended_verifier
    inspec_tests:
      - path: test/integration/unattended-upgrades

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

  - name: cacher
    run_list: *cacher_run_list
    verifier: *cacher_verifier

  - name: compile-time
    run_list: *compile_time_run_list
    verifier: *compile_time_verifier

  - name: unattended-upgrades
    run_list: *unattended_run_list
    verifier: *unattended_verifier
